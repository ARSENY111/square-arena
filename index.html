<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PvP Square Arena</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем официальный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Верхняя панель: Только Баланс -->
        <header class="game-header">
            <div class="brand-title">🪐 ARENA PVP</div>
            <div class="balance-container">
                <span class="coin-icon">🪙</span>
                <span id="balance-value">1000</span>
                <span class="currency-name">AC</span>
            </div>
        </header>

        <!-- Статус раунда -->
        <div class="status-panel">
            <div id="winner-display">Ожидание ставок...</div>
        </div>

        <!-- Арена -->
        <div class="canvas-wrapper">
            <canvas id="squareCanvas" width="360" height="360"></canvas>
        </div>

        <!-- Панель управления ставками -->
        <div class="bet-control-panel">
            <div class="bet-inputs">
                <button type="button" id="bet-minus" class="bet-adjust-btn">-25</button>
                <div class="bet-display">
                    <span class="bet-label">ВАША СТАВКА</span>
                    <span id="current-bet-value">100</span>
                </div>
                <button type="button" id="bet-plus" class="bet-adjust-btn">+25</button>
            </div>
            <button type="button" id="shootBtn" class="action-btn">ПОСТАВИТЬ СТАВКУ</button>
        </div>

        <!-- Список игроков -->
        <div class="players-lobby">
            <h3>В игре:</h3>
            <div id="players-list" class="players-list-grid">
                <div class="empty-lobby-text">Лобби пусто. Сделайте ставку первым!</div>
            </div>
        </div>

        <!-- Отступ, чтобы контент не перекрывался нижней панелью при прокрутке -->
        <div class="bottom-spacer"></div>

        <!-- НОВАЯ НИЖНЯЯ ПАНЕЛЬ ПРОФИЛЯ -->
        <div class="bottom-profile-bar">
            <div class="profile-content">
                <img id="user-avatar-img" class="bottom-avatar" src="https://img.icons8.com/isometric-line/100/user.png" alt="Avatar">
                <div class="profile-details">
                    <span class="profile-welcome">Вы вошли как</span>
                    <span id="username-tag" class="profile-username">Загрузка...</span>
                </div>
            </div>
            <div class="profile-status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">В сети</span>
            </div>
        </div>
    </div>
</body>
</html>
